services:
  db:
    image: postgres:16

    container_name: restaurant-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: restaurant
      POSTGRES_USER: restaurant
      POSTGRES_PASSWORD: password

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant -d restaurant"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: migrate/migrate

    profiles:
      - migrate

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./migrations:/migrations:ro

    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://restaurant:password@db:5432/restaurant?sslmode=disable",
        "up"
      ]

    restart: "no"

  api:
    build: .

    container_name: restaurant-api

    restart: unless-stopped

    environment:
      RESTAURANT_DB_DSN: postgres://restaurant:password@db:5432/restaurant?sslmode=disable

    ports:
      - "4000:4000"

volumes:
  postgres_data:
